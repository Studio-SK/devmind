spring.application.name=template

spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# datasource — every profile reads from these env vars, only ddl-auto/logging differ per profile
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:template_dev}
spring.datasource.username=${DB_USER:template}
spring.datasource.password=${DB_PASSWORD:changeme}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.properties.hibernate.format_sql=true

# jwt config
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:1800000}

# admin seed values (wire up your own seeder if needed)
app.admin.username=${ADMIN_USERNAME:admin}
app.admin.password=${ADMIN_PASSWORD:changeme}
app.admin.email=${ADMIN_EMAIL:admin@example.com}
